<!DOCTYPE html>
<meta charset="utf-8">
<title>turbores benchmark (MT)</title>

<button>Select file and run benchmark</button>
<p></p>

<script type="module">
import { Input, BlobSource, ALL_FORMATS, EncodedPacketSink } from 'mediabunny';
import { Decoder, Frame } from '../src/index';

const p = document.querySelector('p');

document.querySelector('button').addEventListener('click', () => {
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.onchange = async (event) => {
        p.textContent = 'Benchmarking... (may take a while)';

        try {
            const file = event.target.files[0];
            const input = new Input({
                source: new BlobSource(file),
                formats: ALL_FORMATS,
            });

            const track = await input.getPrimaryVideoTrack();
            const sink = new EncodedPacketSink(track);

            const packets = [];
            for await (const packet of sink.packets()) {
                packets.push(packet);
            }

            const decoder = await Decoder.create({
                proresFourCc: 'apch',
                useSharedMemory: true,
            });

            const framePool = [];
            let decodeError = null;

            const decodePass = async () => {
                for (const packet of packets) {
                    while (decoder.desiredSize <= 0) {
                        await decoder.dequeued;
                    }

                    const frame = framePool.shift() ?? new Frame();
                    void decoder.decode(packet.data, frame).then((result) => {
                        if (result instanceof Error) {
                            decodeError ??= result;
                        }
                        framePool.push(frame);
                    });

                    if (decodeError) {
                        throw decodeError;
                    }
                }

                while (decoder.decodeQueueSize > 0) {
                    await decoder.dequeued;
                }
            };

            for (let i = 0; i < 3; i++) {
                await decodePass();
            }

            const start = performance.now();

            const iters = 10;
            for (let i = 0; i < iters; i++) {
                await decodePass();
            }

            const elapsed = performance.now() - start;

            p.textContent = `Done. ${elapsed / iters} ms per full-file decode, ${(iters * packets.length) / (elapsed / 1000)} FPS`;
        } catch (error) {
            p.textContent = 'Errored.';
            throw error;
        }
    };

    fileInput.click();
});
</script>
